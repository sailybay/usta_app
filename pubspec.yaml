name: usta_app
description: "Usta App — A service platform connecting clients with professional service providers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.2
  fl_chart: ^1.1.1

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  firebase_storage: ^13.1.0
  cloud_functions: ^6.0.7

  # AI Assistant (Groq API — uses dio for HTTP, no extra package needed)

  # Navigation
  go_router: ^17.1.0

  # Maps — OpenStreetMap (100% free, no API key needed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # Networking & Utils
  dio: ^5.9.2
  geolocator: ^14.0.2
  connectivity_plus: ^7.0.0
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  uuid: ^4.5.3

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Payments
  flutter_stripe: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4


flutter:
  uses-material-design: true
  generate: true
